<script>
  function langAware() {
    var userLang = navigator.language || navigator.userLanguage;

    // Check if translation exists for the exact language code
    if (!translations[userLang]) {
      // Try just the base language (e.g., 'de' from 'de-DE')
      var baseLang = userLang.split('-')[0];
      if (translations[baseLang]) {
        userLang = baseLang;
      } else {
        // Fallback to English if no translation found
        userLang = 'en-US';
      }
    }

    // Parse the translation data
    var jsdata = JSON.parse(translations[userLang]);

    // Set the lang attribute on the document for RTL languages
    var languageCode = jsdata['language-code'];
    document.documentElement.setAttribute('lang', languageCode);

    // Also set on body for better compatibility
    document.body.setAttribute('lang', languageCode);

    // Now translate using the appropriate language
    document.querySelectorAll('[tkey]').forEach(function (element) {
      var strTr = jsdata[element.getAttribute('tkey')];
      element.innerHTML = strTr;
    });
  }

  // Wait for DOM to be ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', langAware);
  } else {
    langAware();
  }
</script>
